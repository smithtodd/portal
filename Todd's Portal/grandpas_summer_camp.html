<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Grandpa's Summer Learning Camp</title>
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;600;700;800&family=Nunito:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet">
<style>
:root {
  --c: #2D7A3E; --cl: #EDF7EF; --ca: #F5C842;
  --cream: #FDFAF5; --dark: #1C1917; --border: #E5DDD0; --gray: #78716C;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Nunito', sans-serif; background: var(--cream); color: var(--dark); min-height: 100vh; }

.hdr { background: var(--dark); text-align: center; padding: 28px 20px 20px; }
.hdr-title { font-family: 'Baloo 2', sans-serif; font-size: clamp(1.4rem, 5vw, 2.1rem); font-weight: 800; color: #FBBF24; }
.hdr-sub { color: rgba(255,255,255,0.5); font-size: 0.85rem; margin-top: 5px; font-weight: 500; }
.hdr-stars { display: flex; justify-content: center; gap: 7px; margin-top: 14px; }
.star { clip-path: polygon(50% 0%,61% 35%,98% 35%,68% 57%,79% 91%,50% 70%,21% 91%,32% 57%,2% 35%,39% 35%); background: #FBBF24; opacity: 0.4; width: 7px; height: 7px; }
.star.lg { width: 13px; height: 13px; opacity: 1; }

.tabs { display: flex; background: white; border-bottom: 2px solid var(--border); overflow-x: auto; scrollbar-width: none; padding: 0 8px; }
.tabs::-webkit-scrollbar { display: none; }
.tab { flex-shrink: 0; padding: 12px 16px; font-family: 'Baloo 2', sans-serif; font-weight: 700; font-size: 0.82rem; cursor: pointer; border: none; background: transparent; color: #A8A29E; border-bottom: 3px solid transparent; margin-bottom: -2px; transition: all 0.2s; text-align: center; line-height: 1.3; }
.tab:hover { color: var(--dark); }
.tab.on { color: var(--c); border-bottom-color: var(--c); }
.tab-lbl { font-size: 0.67rem; font-weight: 400; display: block; }

.day-panel { display: none; max-width: 760px; margin: 0 auto; padding: 20px 16px 48px; }
.day-panel.on { display: block; }

.hero { border-radius: 14px; padding: 24px 28px; color: white; margin-bottom: 18px; position: relative; overflow: hidden; }
.hero-bg { position: absolute; right: -5px; top: 50%; transform: translateY(-50%); font-size: 5.5rem; opacity: 0.13; pointer-events: none; }
.hero-day { font-size: 0.68rem; font-weight: 700; letter-spacing: 2.5px; text-transform: uppercase; opacity: 0.65; margin-bottom: 4px; }
.hero-title { font-family: 'Baloo 2', sans-serif; font-size: clamp(1.35rem, 4vw, 1.85rem); font-weight: 800; line-height: 1.1; margin-bottom: 10px; }
.hero-badges { display: flex; flex-wrap: wrap; gap: 6px; }
.hero-badge { display: inline-flex; align-items: center; gap: 6px; background: rgba(255,255,255,0.2); border-radius: 20px; padding: 5px 14px; font-size: 0.82rem; font-weight: 600; }
.hero-svc { display: inline-flex; align-items: center; gap: 5px; background: rgba(251,191,36,0.28); border: 1px solid rgba(251,191,36,0.5); border-radius: 20px; padding: 5px 13px; font-size: 0.78rem; font-weight: 600; }
.hero-desc { margin-top: 12px; font-size: 0.87rem; opacity: 0.85; line-height: 1.65; }

.vtoggle { display: flex; background: white; border: 2px solid var(--border); border-radius: 11px; padding: 3px; margin-bottom: 18px; gap: 3px; }
.vbtn { flex: 1; padding: 10px 12px; border: none; border-radius: 8px; font-family: 'Nunito', sans-serif; font-weight: 700; font-size: 0.88rem; cursor: pointer; background: transparent; color: #A8A29E; transition: all 0.2s; }
.vbtn.on { background: var(--c); color: white; }

.view { display: none; }
.view.on { display: block; }

.card { background: white; border: 2px solid var(--border); border-radius: 12px; overflow: hidden; margin-bottom: 14px; }
.card-hdr { background: var(--cl); padding: 10px 18px; font-family: 'Baloo 2', sans-serif; font-weight: 700; color: var(--c); font-size: 0.79rem; letter-spacing: 1px; text-transform: uppercase; }

.sched-row { display: flex; gap: 14px; padding: 11px 18px; border-top: 1px solid var(--border); align-items: flex-start; }
.sched-time { font-family: 'Baloo 2', sans-serif; font-weight: 700; font-size: 0.73rem; color: var(--c); white-space: nowrap; min-width: 80px; padding-top: 2px; }
.sched-text { font-size: 0.875rem; line-height: 1.55; }
.sched-text b { font-weight: 700; }
.sched-lunch { background: #FEF3C7; padding: 11px 18px; border-top: 1px solid #FCD34D; font-size: 0.875rem; font-weight: 600; color: #78350F; display: flex; align-items: center; gap: 8px; }
.sched-svc { background: #FFF7ED; padding: 12px 18px; border-top: 2px solid #FED7AA; font-size: 0.875rem; font-weight: 600; color: #9A3412; display: flex; align-items: flex-start; gap: 9px; line-height: 1.5; }

.pack-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 7px; padding: 14px 18px; }
@media(max-width:480px){ .pack-grid { grid-template-columns: 1fr; } }
.pack-item { display: flex; align-items: flex-start; gap: 8px; font-size: 0.845rem; background: var(--cl); border-radius: 7px; padding: 8px 11px; line-height: 1.4; }

.tips-list { padding: 14px 18px; display: flex; flex-direction: column; gap: 9px; }
.tip-row { display: flex; gap: 10px; font-size: 0.875rem; line-height: 1.55; }
.tip-arr { color: var(--ca); font-weight: 800; flex-shrink: 0; }
.pers-box { margin: 12px 18px 18px; background: var(--cl); border-left: 4px solid var(--ca); border-radius: 0 8px 8px 0; padding: 12px 14px; font-size: 0.875rem; line-height: 1.6; }
.pers-box strong { color: var(--c); font-weight: 700; }

/* SERVICE CARD — GRANDPA VIEW */
.svc-card { background: white; border: 2px solid #FED7AA; border-radius: 12px; overflow: hidden; margin-bottom: 14px; }
.svc-card-hdr { background: linear-gradient(135deg, #FFF7ED 0%, #FEF3C7 100%); padding: 14px 18px; display: flex; align-items: center; gap: 11px; border-bottom: 1px solid #FED7AA; }
.svc-hdr-icon { font-size: 1.6rem; flex-shrink: 0; }
.svc-hdr-text { flex: 1; min-width: 0; }
.svc-hdr-title { font-family: 'Baloo 2', sans-serif; font-weight: 800; font-size: 1.05rem; color: #9A3412; line-height: 1.1; }
.svc-hdr-cause { font-size: 0.76rem; color: #B45309; font-weight: 600; margin-top: 2px; }
.svc-type-pill { background: #9A3412; color: white; border-radius: 20px; padding: 3px 11px; font-size: 0.67rem; font-weight: 700; white-space: nowrap; letter-spacing: 0.5px; flex-shrink: 0; }

.svc-section { padding: 13px 18px; border-bottom: 1px solid #FEE2CA; }
.svc-section:last-of-type { border-bottom: none; }
.svc-section-lbl { font-family: 'Baloo 2', sans-serif; font-weight: 700; font-size: 0.72rem; color: #B45309; text-transform: uppercase; letter-spacing: 1.2px; margin-bottom: 7px; }
.svc-why-text { font-size: 0.875rem; line-height: 1.65; color: var(--dark); }
.svc-prep-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
@media(max-width:480px){ .svc-prep-grid { grid-template-columns: 1fr; } }
.svc-prep-item { display: flex; align-items: flex-start; gap: 7px; font-size: 0.84rem; background: #FFF7ED; border-radius: 7px; padding: 8px 10px; line-height: 1.4; }
.svc-footer { background: #9A3412; color: white; padding: 11px 18px; display: flex; align-items: center; justify-content: space-between; }
.svc-footer-lbl { font-family: 'Baloo 2', sans-serif; font-size: 0.71rem; letter-spacing: 1px; text-transform: uppercase; opacity: 0.7; display: block; margin-bottom: 2px; }
.svc-footer-val { font-size: 0.88rem; font-weight: 700; }

/* SERVICE MISSION CARD — KID VIEW */
.svc-divider { display: flex; align-items: center; gap: 10px; margin: 22px 0 14px; }
.svc-div-line { flex: 1; height: 2px; background: linear-gradient(to right, #FED7AA, transparent); }
.svc-div-line.r { background: linear-gradient(to left, #FED7AA, transparent); }
.svc-div-label { font-family: 'Baloo 2', sans-serif; font-weight: 800; font-size: 0.78rem; color: #9A3412; white-space: nowrap; letter-spacing: 0.5px; }

.svc-act { background: white; border: 2px solid #FED7AA; border-radius: 12px; overflow: hidden; }
.svc-act.done { border-color: #86EFAC; background: #F0FDF4; }
.svc-act-top { display: flex; align-items: flex-start; gap: 12px; padding: 14px 16px; cursor: pointer; user-select: none; background: linear-gradient(135deg, #FFFBEB 0%, white 55%); }
.svc-chk { width: 26px; height: 26px; border: 2.5px solid #EA580C; border-radius: 7px; flex-shrink: 0; display: flex; align-items: center; justify-content: center; margin-top: 1px; transition: all 0.2s; cursor: pointer; }
.svc-act.done .svc-chk { background: #22C55E; border-color: #22C55E; }
.ckmark { display: none; font-size: 15px; line-height: 1; font-weight: 800; }
.act-card.done .ckmark, .svc-act.done .ckmark { display: block; color: white; }
.svc-act-body { flex: 1; min-width: 0; }
.svc-act-title { font-family: 'Baloo 2', sans-serif; font-weight: 700; font-size: 1rem; line-height: 1.2; }
.svc-act-sub { font-size: 0.79rem; color: #B45309; font-style: italic; margin-top: 2px; }
.svc-why-kid { background: #FFF7ED; border: 1.5px solid #FED7AA; border-radius: 8px; padding: 10px 14px; margin: 0 16px 12px; font-size: 0.845rem; line-height: 1.6; color: #7C2D12; }
.svc-why-kid strong { display: block; font-family: 'Baloo 2', sans-serif; font-size: 0.81rem; color: #9A3412; margin-bottom: 3px; }
.svc-steps { display: none; border-top: 1.5px solid #FED7AA; padding: 12px 16px 8px; flex-direction: column; gap: 8px; }
.svc-act.open .svc-steps { display: flex; }
.svc-step-row { display: flex; gap: 10px; font-size: 0.875rem; line-height: 1.55; }
.svc-step-num { width: 23px; height: 23px; border-radius: 50%; background: #EA580C; color: white; font-size: 0.71rem; font-weight: 800; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
.svc-del-row { padding: 10px 16px 14px; }
.svc-del-pill { display: inline-flex; align-items: center; gap: 6px; background: #FFF7ED; border: 1.5px solid #FED7AA; color: #9A3412; border-radius: 20px; padding: 5px 13px; font-size: 0.8rem; font-weight: 700; }
.svc-arr { margin-left: auto; font-size: 1rem; color: #B45309; transition: transform 0.2s; flex-shrink: 0; padding-top: 2px; }
.svc-act.open .svc-arr { transform: rotate(180deg); }

/* STANDARD ACTIVITY CARDS */
.mission-intro { background: var(--cl); border: 2px solid var(--c); border-radius: 12px; padding: 14px 18px; margin-bottom: 14px; font-size: 0.9rem; line-height: 1.65; }
.mission-intro strong { font-family: 'Baloo 2', sans-serif; color: var(--c); font-size: 0.98rem; display: block; margin-bottom: 3px; }

.prog-bar { background: white; border: 2px solid var(--border); border-radius: 10px; padding: 12px 18px; margin-bottom: 14px; display: flex; align-items: center; gap: 12px; }
.prog-lbl { font-family: 'Baloo 2', sans-serif; font-weight: 700; font-size: 0.77rem; color: var(--c); white-space: nowrap; }
.prog-track { flex: 1; height: 10px; background: var(--border); border-radius: 10px; overflow: hidden; }
.prog-fill { height: 100%; background: var(--c); border-radius: 10px; transition: width 0.4s ease; }
.prog-count { font-size: 0.8rem; font-weight: 700; color: var(--gray); white-space: nowrap; }

.act-card { background: white; border: 2px solid var(--border); border-radius: 12px; margin-bottom: 10px; overflow: hidden; transition: border-color 0.2s; }
.act-card.done { border-color: #86EFAC; background: #F0FDF4; }
.act-top { display: flex; align-items: flex-start; gap: 12px; padding: 14px 16px; cursor: pointer; user-select: none; }
.act-check { width: 26px; height: 26px; border: 2.5px solid var(--c); border-radius: 7px; flex-shrink: 0; display: flex; align-items: center; justify-content: center; margin-top: 1px; transition: all 0.2s; cursor: pointer; }
.act-card.done .act-check { background: #22C55E; border-color: #22C55E; }
.act-body { flex: 1; min-width: 0; }
.act-title { font-family: 'Baloo 2', sans-serif; font-weight: 700; font-size: 1rem; line-height: 1.2; }
.act-sub { font-size: 0.79rem; color: var(--gray); font-style: italic; margin-top: 2px; }
.act-arr { margin-left: auto; font-size: 1rem; color: var(--gray); transition: transform 0.2s; flex-shrink: 0; padding-top: 2px; }
.act-card.open .act-arr { transform: rotate(180deg); }
.act-steps { display: none; border-top: 1.5px solid var(--border); padding: 12px 16px 14px; flex-direction: column; gap: 8px; }
.act-card.open .act-steps { display: flex; }
.step-row { display: flex; gap: 10px; font-size: 0.875rem; line-height: 1.55; }
.step-num { width: 23px; height: 23px; border-radius: 50%; background: var(--c); color: white; font-size: 0.71rem; font-weight: 800; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }

.deliverable { background: var(--dark); border-radius: 12px; padding: 18px 22px; color: white; margin-top: 18px; display: flex; gap: 14px; align-items: flex-start; }
.del-icon { font-size: 1.8rem; flex-shrink: 0; }
.del-title { font-family: 'Baloo 2', sans-serif; font-weight: 800; color: #FBBF24; font-size: 0.88rem; margin-bottom: 8px; }
.del-badges { display: flex; flex-wrap: wrap; gap: 6px; }
.del-badge { background: rgba(255,255,255,0.16); border-radius: 20px; padding: 4px 12px; font-size: 0.78rem; font-weight: 600; }
.del-badge.svc { background: rgba(234,88,12,0.45); border: 1px solid rgba(251,191,36,0.3); }

@media print {
  .tabs, .vtoggle { display: none !important; }
  .day-panel { display: block !important; padding: 10px; page-break-after: always; }
  .view { display: block !important; }
  .act-steps, .svc-steps { display: flex !important; }
}
</style>
</head>
<body>

<div class="hdr">
  <div class="hdr-title">⛺ Grandpa's Summer Learning Camp</div>
  <div class="hdr-sub">5 Days of Discovery, Creativity, Service &amp; Adventure</div>
  <div class="hdr-stars">
    <div class="star"></div><div class="star lg"></div><div class="star"></div>
    <div class="star lg"></div><div class="star"></div><div class="star lg"></div><div class="star"></div>
  </div>
</div>

<div class="tabs" id="tabs"></div>
<div id="panels"></div>

<script>
const DAYS = [
  {
    emoji:'🌿', subtitle:'Nature Explorer', title:'Junior Naturalist Day',
    mission:'🔭 Junior Naturalist Field Mission',
    color:'#2D7A3E', light:'#EDF7EF', accent:'#F5C842',
    desc:'Head outside with your field journal and the iNaturalist app to discover, photograph, and identify wild creatures living right in your neighborhood!',
    schedule:[
      {time:'9:00–9:30', head:'Mission Launch', body:'Learn what a naturalist does, set up your field journal, and get a quick tutorial on the iNaturalist app.'},
      {time:'9:30–11:00', head:'Outdoor Expedition', body:'Head outside! Use iNaturalist to photograph and identify birds, bugs, and plants. Bring a litter bag — part of today\'s service mission!'},
      {time:'11:00–11:30', head:'Discovery Review + Snack', body:'Review your iNaturalist observations, count your species, and celebrate every single find!'},
      null,
      {time:'12:30–1:15', head:'Field Journal Art Time', body:'Draw your top 3 discoveries with labels — just like a real naturalist\'s field journal.'},
      {time:'1:15–2:00', head:'Creature Expert Cards', body:'Pick your favorite bird and bug. Look up 3 cool facts each and make a "Creature Expert Card."'},
      {time:'2:00–3:00', head:'🌱 Service: Pollinator Protectors', body:'Make wildflower seed packet gifts for 5 neighbors and deliver them — with a note on why pollinators need our help.', svc:true},
    ],
    packing:['📱 iNaturalist app (downloaded)','📓 Notebook / field journal','🖍️ Colored pencils','🔍 Magnifying glass','🎒 Snacks + water bottle','🧴 Sunscreen + hat','🌱 Wildflower seeds + 5 envelopes','🛍️ Small bag for litter pickup'],
    tips:[
      'Download and set up iNaturalist the night before — create a free account at inaturalist.org',
      'Let her lead the hunt. Your role is "photographer\'s assistant" — hold the bag, cheer every find',
      'If she\'s frustrated with an ID, say "Let\'s just take the photo and see what the app says" — no pressure',
      'Bugs under rocks and leaves are jackpot finds. Encourage gentle lifting and replacing',
      'Frame bird-watching as a stealth mission — "Who can stay quietest the longest?"',
      'If it rains, pivot to a covered porch or window — iNaturalist works anywhere you can see nature',
    ],
    personalityNote:'She\'ll want to identify everything herself — perfect. Your job is to hold the bag and hype every discovery like it\'s the most incredible thing you\'ve ever seen.',
    activities:[
      {title:'🔍 Mission Briefing', sub:'Set up your gear and get your mission.',
       steps:['Open your field journal to page 1. Write today\'s date and "Day 1: Junior Naturalist."','Open iNaturalist. Practice taking a photo and submitting one test observation.','Draw a quick map of where you\'ll explore today — your backyard, park, or block.','Set your mission goal: find at least 8 different species before lunchtime!']},
      {title:'📸 The Expedition', sub:'Explore and document — every creature counts.',
       steps:['Walk slowly and look carefully — under leaves, on flowers, near water, on bark.','When you spot something, FREEZE. Then photograph it using iNaturalist.','Record each find in your journal: quick sketch + where you found it.','Challenge bonus: find something that flies, something that crawls, AND something that hops!']},
      {title:'🎨 Field Journal Artist', sub:'Real naturalists draw what they discover.',
       steps:['Choose your 3 most interesting discoveries from the expedition.','Draw each one as carefully as you can — use colored pencils to make it look real!','Add labels with the creature\'s name (from iNaturalist) and where you found it.','Write one sentence about why you chose each as a favorite.']},
      {title:'🦋 Creature Expert Cards', sub:'Become the world\'s leading expert on two creatures.',
       steps:['Pick your favorite bird AND your favorite bug from today.','Look up 3 amazing facts about each one (tablet, book, or ask Grandpa to help search).','Create a "Creature Expert Card" for each — draw it, name it, and list your 3 facts.','Add a star rating (1–5 stars) and write why you\'d recommend seeing this creature.']},
    ],
    deliverables:['Field Journal Pages','Creature Expert Cards x2','iNaturalist Observations','Litter Collected','Seed Packets Delivered x5 🌱'],
    service:{
      title:'🌱 Pollinator Protectors',
      type:'Theme-Connected',
      cause:'Protecting Pollinators',
      why:'Bees, butterflies, and other pollinators help plants grow food and flowers for the whole world — but their numbers are dropping fast because of habitat loss and disappearing wildflowers. Even one small garden in a neighbor\'s yard can make a real difference. Scientists actually track observations from apps like iNaturalist to study this.',
      prep:['Buy one packet of wildflower seeds at any garden center (under $3)','Gather 5 small envelopes, or fold squares of paper into envelopes','Have colored pencils ready for decorating','Bring a small trash bag on the morning walk for litter pickup during the expedition'],
      steps:[
        'Talk with Grandpa first: what is a pollinator, and why do they matter? Can you name at least 3 pollinators you saw today?',
        'During the morning expedition, carry a small bag and pick up any litter you spot — litter harms wildlife and destroys their habitat.',
        'Back home, decorate 5 small envelopes beautifully — draw a bee, butterfly, or flower on each one.',
        'Carefully divide the wildflower seeds equally into each envelope and seal them up.',
        'Write a note for each packet: "Plant these to help bees and butterflies! From your neighbor, [Your Name]."',
        'Walk with Grandpa and personally deliver one seed packet to 5 different neighbors. Ring the doorbell and hand it over yourself!'
      ],
      deliverable:'5 Seed Packets Delivered to Neighbors'
    }
  },
  {
    emoji:'💻', subtitle:'Coding Academy', title:'Game Designer Academy',
    mission:'🎮 Game Designer for a Day',
    color:'#2563EB', light:'#EFF6FF', accent:'#7C3AED',
    desc:'Learn to code in Scratch, build your very own game or animation, and launch it with a real demo at the end of the day!',
    schedule:[
      {time:'9:00–9:20', head:'Mission Launch', body:'What is coding, and why do people do it? Quick conversation + explore what Scratch is.'},
      {time:'9:20–10:30', head:'Scratch Basics Tutorial', body:'Complete the "Getting Started" tutorial at scratch.mit.edu. Learn to move, speak, and play sounds.'},
      {time:'10:30–11:00', head:'The Cat Challenge', body:'Make Scratch Cat do something completely silly — dance, tell a joke, spin. 30-minute challenge!'},
      {time:'11:00–11:30', head:'Demo + Snack + Plan', body:'Demo your silly creation to Grandpa. Snack break. Sketch your bigger project idea on paper.'},
      null,
      {time:'12:30–1:30', head:'💛 Service: Kindness Cards', body:'Handwrite and illustrate 5 personal cards for people in your life who could use a smile today.', svc:true},
      {time:'1:30–2:45', head:'Build Your Project', body:'Code your game, story, or animation in Scratch! Add sprites, sounds, and backgrounds.'},
      {time:'2:45–3:00', head:'Game Launch Party', body:'Demo your finished project, walk Grandpa through how you built it, and save the link.'},
    ],
    packing:['💻 Computer or tablet with internet','🔐 Scratch account (free at scratch.mit.edu)','📄 Paper + pencil for planning','🖍️ Colored pencils for sprites and cards','🍿 Snacks for the coding marathon','💌 5 sheets of cardstock folded into cards'],
    tips:[
      'Create a free Scratch account the night before at scratch.mit.edu — or let her create it herself',
      'The built-in "Getting Started" tutorial on Scratch is excellent, self-paced, and very clear',
      'Her "I can do it myself" personality is PERFECT for Scratch — let her click and explore freely',
      'If she is stuck, ask "What do you WANT it to do?" — guide with questions, never answers',
      'Common quick wins: making a sprite say something, playing a sound, changing a background',
      'If she finishes fast: add a score counter, a second character, or a "Game Over" screen',
    ],
    personalityNote:'Coding frustrates everyone when things don\'t work. If she hits a wall, normalize it: "Even professional coders spend hours on bugs. What can we try next?" Keep it in problem-solving mode.',
    activities:[
      {title:'🔓 Crack the Code', sub:'Discover what coding is all about.',
       steps:['Talk with Grandpa: What do you think coding is? Where do you see it every day?','Go to scratch.mit.edu and log into your account (or create one together).','Click "Start Creating" and explore the screen — what do you notice?','Complete the "Getting Started" tutorial — do every step, even if they seem easy!']},
      {title:'🐱 The Cat Challenge', sub:'Make Scratch Cat as silly as possible — 30 minutes!',
       steps:['Start a new project. Your mission: make Scratch Cat do something funny.','Ideas: make it dance, tell a joke, play music, or bounce around the screen.','Use at least 3 different types of blocks (move, say, play sound, wait, repeat…).','When done, announce your creation to Grandpa with a dramatic title!']},
      {title:'🎮 Game Designer HQ', sub:'Great games start on paper — not on screen.',
       steps:['Decide: will you make a game, a story, or an animation?','On paper, sketch: What does the screen look like? Who are the characters?','Write 3 things you MUST include and 2 bonus features if you have time.','Give your project a name — write it at the top of your planning page!']},

function setTheme(d) {
  const r = document.documentElement;
  r.style.setProperty('--c', d.color);
  r.style.setProperty('--cl', d.light);
  r.style.setProperty('--ca', d.accent);
}

function buildTabs() {
  const el = document.getElementById('tabs');
  DAYS.forEach((d, i) => {
    const b = document.createElement('button');
    b.className = 'tab' + (i === 0 ? ' on' : '');
    b.innerHTML = d.emoji + ' Day ' + (i+1) + '<span class="tab-lbl">' + d.subtitle + '</span>';
    b.onclick = () => switchDay(i);
    el.appendChild(b);
  });
}

function sched(day) {
  let h = '<div class="card"><div class="card-hdr">📅 Day Schedule (Suggested Times — Flexible)</div>';
  day.schedule.forEach(r => {
    if (r === null) {
      h += '<div class="sched-lunch">🥪 12:00–12:30 — Lunch Break</div>';
    } else if (r.svc) {
      h += '<div class="sched-svc"><span>🧡</span><span><b>' + r.time + ' — ' + r.head.replace(/🌱|💛|🎨|📚|✨/g,'').trim() + '</b> — ' + r.body + '</span></div>';
    } else {
      h += '<div class="sched-row"><div class="sched-time">' + r.time + '</div><div class="sched-text"><b>' + r.head + '</b> — ' + r.body + '</div></div>';
    }
  });
  return h + '</div>';
}

function packing(day) {
  let h = '<div class="card"><div class="card-hdr">🎒 What to Pack / Prep the Night Before</div><div class="pack-grid">';
  day.packing.forEach(item => { h += '<div class="pack-item">' + item + '</div>'; });
  return h + '</div></div>';
}

function tips(day) {
  let h = '<div class="card"><div class="card-hdr">🧠 Facilitator Tips for Grandpa</div><div class="tips-list">';
  day.tips.forEach(t => { h += '<div class="tip-row"><span class="tip-arr">→</span><span>' + t + '</span></div>'; });
  h += '</div><div class="pers-box"><strong>🧒 Personality Note:</strong> ' + day.personalityNote + '</div></div>';
  return h;
}

function svcBlock(svc) {
  let prepItems = svc.prep.map(p => '<div class="svc-prep-item">📌 ' + p + '</div>').join('');
  return '<div class="svc-card">'
    + '<div class="svc-card-hdr">'
    + '<div class="svc-hdr-icon">🧡</div>'
    + '<div class="svc-hdr-text"><div class="svc-hdr-title">' + svc.title + '</div><div class="svc-hdr-cause">Cause: ' + svc.cause + '</div></div>'
    + '<div class="svc-type-pill">' + svc.type + '</div>'
    + '</div>'
    + '<div class="svc-section"><div class="svc-section-lbl">💡 Why This Matters — Share With Her</div><div class="svc-why-text">' + svc.why + '</div></div>'
    + '<div class="svc-section"><div class="svc-section-lbl">🌙 Night-Before Prep for Grandpa</div><div class="svc-prep-grid">' + prepItems + '</div></div>'
    + '<div class="svc-footer"><div><span class="svc-footer-lbl">Deliverable</span><span class="svc-footer-val">' + svc.deliverable + '</span></div><div style="font-size:1.6rem">🧡</div></div>'
    + '</div>';
}

function activities(day, di) {
  const total = day.activities.length;
  let h = '<div class="mission-intro"><strong>🎯 Mission: ' + day.mission + '</strong>' + day.desc + '</div>';
  h += '<div class="prog-bar"><div class="prog-lbl">MISSIONS</div><div class="prog-track"><div class="prog-fill" id="pf'+di+'" style="width:0%"></div></div><div class="prog-count" id="pc'+di+'">0 / '+total+'</div></div>';

  day.activities.forEach((act, ai) => {
    const id = 'ac'+di+ai;
    h += '<div class="act-card" id="'+id+'">'
      + '<div class="act-top" onclick="toggleAct(\''+id+'\')">'
      + '<div class="act-check" onclick="event.stopPropagation();chkAct(\''+id+'\','+di+','+total+')"><span class="ckmark">✓</span></div>'
      + '<div class="act-body"><div class="act-title">'+act.title+'</div><div class="act-sub">'+act.sub+'</div></div>'
      + '<div class="act-arr">▾</div></div>'
      + '<div class="act-steps">'
      + act.steps.map((s,si)=>'<div class="step-row"><div class="step-num">'+(si+1)+'</div><span>'+s+'</span></div>').join('')
      + '</div></div>';
  });

  // Service mission card
  const sv = day.service;
  const svid = 'sv'+di;
  h += '<div class="svc-divider"><div class="svc-div-line"></div><div class="svc-div-label">🧡 SERVICE MISSION</div><div class="svc-div-line r"></div></div>';
  h += '<div class="svc-act" id="'+svid+'">'
    + '<div class="svc-act-top" onclick="toggleSvc(\''+svid+'\')">'
    + '<div class="svc-chk" onclick="event.stopPropagation();chkSvc(\''+svid+'\')"><span class="ckmark">✓</span></div>'
    + '<div class="svc-act-body"><div class="svc-act-title">'+sv.title+'</div><div class="svc-act-sub">Cause: '+sv.cause+'</div></div>'
    + '<div class="svc-arr">▾</div></div>'
    + '<div class="svc-why-kid"><strong>💡 Why this matters:</strong> '+sv.why+'</div>'
    + '<div class="svc-steps">'
    + sv.steps.map((s,si)=>'<div class="svc-step-row"><div class="svc-step-num">'+(si+1)+'</div><span>'+s+'</span></div>').join('')
    + '</div>'
    + '<div class="svc-del-row"><span class="svc-del-pill">🏅 '+sv.deliverable+'</span></div>'
    + '</div>';

  return h;
}

function deliverable(day) {
  const badges = day.deliverables.map(d => {
    const isSvc = /🌱|💛|🎨|📚|✨/.test(d);
    return '<span class="del-badge' + (isSvc ? ' svc' : '') + '">' + d + '</span>';
  }).join('');
  return '<div class="deliverable"><div class="del-icon">🏆</div><div><div class="del-title">TODAY\'S TAKE-AWAYS</div><div class="del-badges">' + badges + '</div></div></div>';
}

  const el = document.getElementById('panels');
  DAYS.forEach((day, di) => {
    const div = document.createElement('div');
    div.className = 'day-panel' + (di === 0 ? ' on' : '');
    div.id = 'panel'+di;
    div.innerHTML =
      '<div class="hero" style="background:'+day.color+'">'
      + '<div class="hero-bg">'+day.emoji+'</div>'
      + '<div class="hero-day">DAY '+(di+1)+' OF 5</div>'
      + '<div class="hero-title">'+day.title+'</div>'
      + '<div class="hero-badges"><span class="hero-badge">'+day.mission+'</span><span class="hero-svc">🧡 '+day.service.title+'</span></div>'
      + '<div class="hero-desc">'+day.desc+'</div>'
      + '</div>'
      + '<div class="vtoggle">'
      + '<button class="vbtn on" id="vbf'+di+'" onclick="switchView('+di+',\'fac\')">👴 Grandpa\'s Guide</button>'
      + '<button class="vbtn" id="vbk'+di+'" onclick="switchView('+di+',\'kid\')">⭐ My Activity Cards</button>'
      + '</div>'
      + '<div class="view on" id="vf'+di+'">' + sched(day) + packing(day) + tips(day) + svcBlock(day.service) + deliverable(day) + '</div>'
      + '<div class="view" id="vk'+di+'">' + activities(day, di) + deliverable(day) + '</div>';
    el.appendChild(div);
  });
}

function switchDay(i) {
  document.querySelectorAll('.tab').forEach((t,ti) => t.classList.toggle('on', ti===i));
  document.querySelectorAll('.day-panel').forEach((p,pi) => p.classList.toggle('on', pi===i));
  setTheme(DAYS[i]);
  window.scrollTo({top:0, behavior:'smooth'});
}

function switchView(di, view) {
  ['fac','kid'].forEach(v => {
    document.getElementById('v'+v[0]+di).classList.toggle('on', v===view);
    document.getElementById('vb'+(v==='fac'?'f':'k')+di).classList.toggle('on', v===view);
  });
}

function toggleAct(id) { document.getElementById(id).classList.toggle('open'); }
function toggleSvc(id) { document.getElementById(id).classList.toggle('open'); }

function chkAct(id, di, total) {
  document.getElementById(id).classList.toggle('done');
  const done = document.querySelectorAll('#panel'+di+' .act-card.done').length;
  document.getElementById('pf'+di).style.width = (done/total*100)+'%';
  document.getElementById('pc'+di).textContent = done+' / '+total;
}

function chkSvc(id) {
  document.getElementById(id).classList.toggle('done');
}

buildTabs();
buildPanels();
setTheme(DAYS[0]);
</script>
</body>
</html>
